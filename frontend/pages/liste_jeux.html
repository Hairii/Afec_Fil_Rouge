<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liste des jeux - GameFinder</title>
  <link href="../css/output.css" rel="stylesheet" />
</head>

<body class="font-sans bg-cover bg-center min-h-screen" style="background-image: url('../public/image/background.jpg')">

  <!-- ====== MAIN ====== -->
  <main class="min-h-[80vh] p-6 text-center">
    <div class="max-w-7xl mx-auto flex flex-col gap-6">

      <!-- Genres -->
      <div class="GenrePanel mb-6">
        <button id="toggleGenresBtn" class="px-6 py-2 bg-purple-600 text-white font-semibold rounded-full shadow-md hover:bg-purple-500 transition">
          Genres 🎮
        </button>
        <div id="checkboxContainer" class="hidden flex flex-wrap gap-2 justify-center items-center mt-4"></div>
      </div>

      <!-- Recherche -->
      <div class="text-center mb-6">
        <input type="search" id="searchInput" placeholder="Rechercher un jeu..."
          class="w-80 max-w-full bg-white px-4 py-2 rounded-lg text-black text-lg focus:outline-none focus:ring-2 focus:ring-purple-500" />
      </div>

      <!-- Tri -->
      <div class="flex justify-center items-center gap-2 mb-4">
        <label for="sortGames" class="text-white font-semibold">Trier par :</label>
        <select id="sortGames" class="bg-gray-800 text-white px-2 py-1 rounded-lg focus:ring-2 focus:ring-purple-500">
          <option value="name-asc">Nom A → Z</option>
          <option value="name-desc">Nom Z → A</option>
          <option value="rating-desc">Note ↑</option>
          <option value="rating-asc">Note ↓</option>
        </select>
      </div>

      <!-- Liste jeux -->
      <h2 class="text-2xl text-white font-bold text-center mb-6">Liste des jeux</h2>
      <div id="gameList" class="flex flex-wrap justify-center gap-6"></div>

      <!-- Pagination -->
      <div id="pagination" class="flex justify-center gap-3 mt-12"></div>

    </div>
  </main>

  <script type="module" src="../js/components/header.js"></script>
  <script type="module" src="../js/components/footer.js"></script>
  <script type="module" src="../js/controller/liste.controller.js"></script>
</body>
</html>
