<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Commentaires - GameFinder</title>
  <link href="../css/output.css" rel="stylesheet" />
</head>

<body class="font-sans bg-cover bg-center min-h-screen" style="background-image: url('../public/image/background.jpg')">



  <main class="min-h-[80vh] p-6">
    <div class="max-w-5xl mx-auto flex flex-col gap-6">

      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-extrabold text-white">💬 Modération des commentaires</h1>
        <a href="/pages/admin.html" class="px-4 py-2 bg-indigo-600 text-white rounded-full hover:bg-blue-500 transition text-sm font-semibold">
          🎮 Gestion des jeux
        </a>
      </div>

      <p id="globalMessage" class="text-sm min-h-[20px]"></p>

      <div id="loadingMsg" class="text-white text-center py-10">Chargement...</div>

      <div id="emptyMsg" class="hidden bg-gray-900/70 backdrop-blur-md rounded-2xl border border-indigo-600/30 p-10 text-center text-gray-400">
        ✅ Aucun commentaire signalé pour le moment.
      </div>

      <div id="commentsList" class="flex flex-col gap-4">
      </div>

    </div>
  </main>

  <script type="module" src="../js/components/header.js"></script>
  <script type="module" src="../js/components/footer.js"></script>
  <script type="module" src="../js/controller/admin_comments.controller.js"></script>
</body>
</html>
